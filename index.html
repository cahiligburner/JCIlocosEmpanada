<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>J&C ILOCOS EMPANADA</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f4f4;
}

header {
  background: #222;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}

select, input {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  width: 100%;
  background: green;
  color: white;
  border: none;
  border-radius: 5px;
}

button:hover {
  background: darkgreen;
}

.addons label {
  display: block;
  margin: 5px 0;
}

.item {
  border-bottom: 1px solid #ddd;
  padding: 8px 0;
}

.remove-btn {
  background: red;
  margin-top: 5px;
}

.total {
  font-size: 20px;
  font-weight: bold;
}

/* RECEIPT MODAL */
#receiptModal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

#receiptBox {
  background: white;
  width: 90%;
  max-width: 400px;
  margin: 50px auto;
  padding: 15px;
  border-radius: 10px;
}
button {
  font-size: 16px;
}

select {
  font-size: 16px;
}

input {
  font-size: 18px;
}

.card {
  padding: 18px;
}

button {
  margin-top: 5px;
}
</style>
</head>

<body>

<header>
<h2>Sales Tracker POS</h2>
</header>

<div class="container">

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<p id="todaySales">Today Sales: ₱0</p>
<p id="totalTransactions">Transactions: 0</p>
</div>

<button onclick="exportCSV()" style="background:#0066cc;margin-top:10px;">
Export Excel (CSV)
</button>

<!-- NEW ORDER -->
<div class="card">
<h3>New Sale</h3>

<label>Product</label>
<select id="product"></select>

<label>Quantity</label>
<div style="display:flex;align-items:center;gap:10px;">
  <button onclick="changeQty(-1)" style="width:60px;font-size:20px;">−</button>
  <input type="text" id="qty" value="1" readonly style="text-align:center;font-size:18px;">
  <button onclick="changeQty(1)" style="width:60px;font-size:20px;">+</button>
</div>

<h4>Add-ons</h4>
<div class="addons" id="addons"></div>

<button onclick="addToCart()">Add to Cart</button>
<button onclick="clearInputs()" style="background:#555;margin-top:10px;">Clear Inputs</button>
</div>

<!-- CART -->
<div class="card">
<h3>Cart</h3>
<div id="cart"></div>
<p class="total" id="total">Total: ₱0</p>

<button onclick="completeSale()">Complete Sale</button>
</div>

<!-- HISTORY -->
<div class="card">
<h3>Sales History</h3>
<div id="history"></div>
<label><b>Filter by Date</b></label>
<input type="date" id="historyDate" onchange="renderHistory()">

<button onclick="renderHistory()" style="background:#444;margin-top:10px;">
Filter
</button>

<button onclick="resetHistoryFilter()" style="background:#777;margin-top:10px;">
Show All
</button>
</div>
</div>

<!-- RECEIPT -->
<div id="receiptModal">
  <div id="receiptBox">
    <h3>Receipt</h3>
    <div id="receiptContent"></div>
    <h3 id="receiptTotal"></h3>
    <button onclick="window.print()">Print</button>
    <button onclick="closeReceipt()" style="background:#555;">Close</button>
  </div>
</div>

<script>
  function deleteSale(index) {
  if (!confirm("Delete this sale?")) return;

  sales.splice(index, 1);
  localStorage.setItem("sales", JSON.stringify(sales));

  renderHistory();
  updateDashboard();
}
function endShiftExport() {
  let today = new Date().toDateString();

  let todaySales = sales.filter(s =>
    new Date(s.date).toDateString() === today
  );

  if (todaySales.length === 0) {
    alert("No sales today to export.");
    return;
  }

  let dataStr = JSON.stringify(todaySales, null, 2);
  let blob = new Blob([dataStr], { type: "application/json" });
  let url = URL.createObjectURL(blob);

  let fileName = `end-shift-${new Date().toISOString().split("T")[0]}.json`;

  let a = document.createElement("a");
  a.href = url;
  a.download = fileName;
  a.click();

  URL.revokeObjectURL(url);
}
function resetHistoryFilter() {
  document.getElementById("historyDate").value = "";
  renderHistory();
}
function changeQty(val) {
  let qty = document.getElementById("qty");
  let current = parseInt(qty.value);

  current += val;

  if (current < 1) current = 1;

  qty.value = current;

}
function exportCSV() {
  let csv = "Date,Total Items,Total Amount\n";

  sales.forEach(s => {
    csv += `"${s.date}",${s.items.length},${s.total}\n`;
  });

  let blob = new Blob([csv], { type: "text/csv" });
  let url = URL.createObjectURL(blob);

  let a = document.createElement("a");
  a.href = url;
  a.download = "sales-report.csv";
  a.click();

  URL.revokeObjectURL(url);
}
// PRODUCTS
const products = {
  "Regular": 70,
  "Special": 100,
  "Spicy Special": 110,
  "Cheesy Special": 115,
  "Cheesy Spicy Special": 125,
  "All Meat": 130,
  "Spicy Meaty": 140,
  "Cheesy Meaty": 145,
  "Spicy Cheesy Meaty": 155,
  "Super Special": 160,
  "Overload": 175
};

const addons = {
  "Extra Meat": 30,
  "Extra Papaya": 30,
  "Extra Cheese": 15,
  "Extra Spicy": 10,
  "Extra Egg": 15
};

let cart = [];
let sales = JSON.parse(localStorage.getItem("sales")) || [];

// INIT
function init() {
  let productSelect = document.getElementById("product");

  for (let p in products) {
    productSelect.innerHTML += `<option value="${p}">${p} - ₱${products[p]}</option>`;
  }

  let addonDiv = document.getElementById("addons");

  for (let a in addons) {
    addonDiv.innerHTML += `
      <label>
        ${a} (₱${addons[a]})
        <input type="number" id="addon_${a}" value="0" min="0">
      </label>
    `;
  }

  renderHistory();
  updateDashboard();
}

// ADD TO CART
function addToCart() {
  let product = document.getElementById("product").value;
  let qty = parseInt(document.getElementById("qty").value);

  let addonList = [];

  for (let a in addons) {
    let val = parseInt(document.getElementById("addon_" + a).value);
    if (val > 0) {
      addonList.push({
        name: a,
        qty: val,
        price: addons[a]
      });
    }
  }

  cart.push({
    product,
    qty,
    price: products[product],
    addons: addonList
  });

  renderCart();

  // ✅ AUTO RESET INPUTS AFTER ADDING
  clearInputs();
}
// REMOVE SINGLE ITEM
function removeItem(index) {
  cart.splice(index, 1);
  renderCart();
}

// CLEAR INPUTS
function clearInputs() {
  document.getElementById("qty").value = 1;

  for (let a in addons) {
    document.getElementById("addon_" + a).value = 0;
  }
}
// RENDER CART
function renderCart() {
  let cartDiv = document.getElementById("cart");
  cartDiv.innerHTML = "";

  let total = 0;

  cart.forEach((item, index) => {
    let itemTotal = item.qty * item.price;

    let addonText = "";

    item.addons.forEach(a => {
      itemTotal += a.qty * a.price;
      addonText += `<div>+ ${a.name} x${a.qty}</div>`;
    });

    total += itemTotal;

    cartDiv.innerHTML += `
      <div class="item">
        <b>${item.product} x${item.qty}</b><br>
        ${addonText}
        <b>₱${itemTotal}</b>
        <button class="remove-btn" onclick="removeItem(${index})">Remove</button>
      </div>
    `;
  });

  document.getElementById("total").innerText = "Total: ₱" + total;
}

// COMPLETE SALE + RECEIPT
function completeSale() {
  if (cart.length === 0) return alert("Cart is empty");

  let total = 0;
  let receiptHTML = "";

  cart.forEach(item => {
    let itemTotal = item.qty * item.price;

    receiptHTML += `<b>${item.product} x${item.qty}</b><br>`;

    item.addons.forEach(a => {
      itemTotal += a.qty * a.price;
      receiptHTML += `+ ${a.name} x${a.qty}<br>`;
    });

    receiptHTML += `<br>`;
    total += itemTotal;
  });

  let sale = {
    date: new Date().toLocaleString(),
    items: cart,
    total
  };

  sales.push(sale);
  localStorage.setItem("sales", JSON.stringify(sales));

  // SHOW RECEIPT
  document.getElementById("receiptContent").innerHTML = receiptHTML;
  document.getElementById("receiptTotal").innerText = "TOTAL: ₱" + total;
  document.getElementById("receiptModal").style.display = "block";

  cart = [];
  renderCart();
  renderHistory();
  updateDashboard();
}

// CLOSE RECEIPT
function closeReceipt() {
  document.getElementById("receiptModal").style.display = "none";
}

// HISTORY
function renderHistory() {
  let historyDiv = document.getElementById("history");
  historyDiv.innerHTML = "";

  let selectedDate = document.getElementById("historyDate")?.value;

  let filtered = sales.slice().reverse().map((s, index) => {
    return { ...s, realIndex: sales.length - 1 - index };
  }).filter(s => {
    if (!selectedDate) return true;

    let saleDate = new Date(s.date).toISOString().split("T")[0];
    return saleDate === selectedDate;
  });

  filtered.forEach(s => {
    historyDiv.innerHTML += `
      <div class="item">
        ${s.date}<br>
        <b>₱${s.total}</b><br>
        <button onclick="deleteSale(${s.realIndex})" style="background:red;margin-top:5px;">
          Delete
        </button>
      </div>
    `;
  });
}

// DASHBOARD
function updateDashboard() {
  let today = new Date().toDateString();
  let total = 0;
  let count = 0;

  sales.forEach(s => {
    if (new Date(s.date).toDateString() === today) {
      total += s.total;
      count++;
    }
  });

  document.getElementById("todaySales").innerText = "Today Sales: ₱" + total;
  document.getElementById("totalTransactions").innerText = "Transactions: " + count;
}

init();
</script>

</body>
</html>
